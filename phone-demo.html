<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Canarinho CAR — Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 60% 40%, #1a3a1a 0%, #0d1f0d 60%, #060e06 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
    }

    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .label {
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* ── Phone shell ── */
    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      background: #1a1a1a;
      border-radius: 54px;
      box-shadow:
        0 0 0 2px #3a3a3a,
        0 0 0 6px #111,
        0 0 0 8px #2a2a2a,
        0 40px 80px rgba(0,0,0,0.8),
        inset 0 0 0 1px rgba(255,255,255,0.05);
    }

    /* Side buttons */
    .phone::before {
      content: '';
      position: absolute;
      left: -10px;
      top: 120px;
      width: 4px;
      height: 36px;
      background: #2a2a2a;
      border-radius: 2px 0 0 2px;
      box-shadow: 0 50px 0 #2a2a2a, 0 95px 0 #2a2a2a;
    }
    .phone::after {
      content: '';
      position: absolute;
      right: -10px;
      top: 155px;
      width: 4px;
      height: 62px;
      background: #2a2a2a;
      border-radius: 0 2px 2px 0;
    }

    /* Screen area */
    .screen {
      position: absolute;
      inset: 12px;
      border-radius: 44px;
      overflow: hidden;
      background: #000;
      padding-top: 48px;
    }

    /* Dynamic island (notch) */
    .island {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 10px;
      gap: 5px;
    }

    .island::before {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 2px solid #2d2d2d;
      box-shadow: inset 0 0 4px rgba(0,120,255,0.3);
    }

    /* Home indicator */
    .home-bar {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 5px;
      background: rgba(255,255,255,0.35);
      border-radius: 3px;
      z-index: 10;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Status bar overlay */
    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 54px;
      z-index: 9;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 16px 24px 0;
      pointer-events: none;
    }

    .status-time {
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-icons svg {
      fill: white;
      opacity: 0.9;
    }

    /* Reflection */
    .screen::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.04), transparent);
      z-index: 20;
      pointer-events: none;
      border-radius: 44px 44px 0 0;
    }

    /* Bottom label */
    .tagline {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .tagline span {
      color: #4ade80;
    }
  </style>
</head>
<body>
  <div class="scene">
    <p class="label">Canarinho CAR · Demo</p>

    <div class="phone">
      <div class="screen">
        <!-- Status bar -->
        <div class="status-bar">
          <span class="status-time" id="clock">9:41</span>
          <div class="status-icons">
            <!-- Signal -->
            <svg width="17" height="12" viewBox="0 0 17 12">
              <rect x="0" y="7" width="3" height="5" rx="1"/>
              <rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/>
              <rect x="9" y="2" width="3" height="10" rx="1"/>
              <rect x="13.5" y="0" width="3" height="12" rx="1" opacity="0.35"/>
            </svg>
            <!-- WiFi -->
            <svg width="16" height="12" viewBox="0 0 16 12">
              <path d="M8 9.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3z"/>
              <path d="M3.5 6.5C5 5 6.4 4.3 8 4.3s3 .7 4.5 2.2l1.5-1.5C12 3 10.1 2 8 2S4 3 2 4.9l1.5 1.6z" opacity="0.6"/>
              <path d="M1 3.8C3 1.8 5.4.5 8 .5s5 1.3 7 3.3L13.5 5.3C11.8 3.6 10 2.8 8 2.8S4.2 3.6 2.5 5.3L1 3.8z" opacity="0.3"/>
            </svg>
            <!-- Battery -->
            <svg width="25" height="12" viewBox="0 0 25 12">
              <rect x="0" y="1" width="21" height="10" rx="2.5" stroke="white" stroke-width="1" fill="none" opacity="0.4"/>
              <rect x="1.5" y="2.5" width="16" height="7" rx="1.5" fill="white"/>
              <rect x="22" y="3.5" width="2.5" height="5" rx="1" fill="white" opacity="0.4"/>
            </svg>
          </div>
        </div>

        <!-- Dynamic Island -->
        <div class="island"></div>

        <!-- The app -->
        <iframe
          src="http://localhost:8080"
          title="Canarinho CAR"
          allow="microphone; camera"
        ></iframe>

        <!-- Home indicator -->
        <div class="home-bar"></div>
      </div>
    </div>

    <p class="tagline">Trilha adaptativa para o <span>Cadastro Ambiental Rural</span></p>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('clock').textContent = h + ':' + m;
    }
    updateClock();
    setInterval(updateClock, 10000);
  </script>
</body>
</html>
